<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberjaya Stray Scan</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-item" onclick="toggleSidebar()" title="Toggle Menu">
                <div style="font-size: 24px;">&#9776;</div>
            </div>
            
<div class="sidebar-item" title="Login">
    <span>Login</span>
</div>

<div class="sidebar-item" title="Register">
    <span>Register</span>
</div>

<div class="sidebar-item" title="Report">
    <span>New Report</span>
</div>

<div class="sidebar-item" title="Record">
    <span>Past Record</span>
</div>
            <div class="spacer"></div>

            <div class="sidebar-item" title="Settings">
                <div style="font-size: 20px;">&#9881;</div>
                <span>Settings</span>
            </div>
        </div>

        <div id="main-content">
            <header>
                <h1 style="margin: 0;">Cyberjaya Stray Scan</h1>
                <nav>
                    <button>About</button>
                    <button>Contact</button>
                </nav>
            </header>

            <div id="map">
                <button id="recenter-btn" onclick="recenterMap(event)">📍 Recenter to Origin</button>
            </div>

            <section>
                <h2>Quick Actions</h2>
                <button style="background-color: #f09c16; color: white;">Report New Stray</button>
            </section>
        </div>
    </div>

    <script>
        // --- Global Variables ---
        const cyberCoord = [2.9213, 101.6559];
        let userPos = null;
        var marker;

        // --- Map Initialization ---
        var map = L.map('map').setView(cyberCoord, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Auto-detect user position
map.locate({setView: true, maxZoom: 16});
map.on('locationfound', function(e) {
    userPos = e.latlng;
    if (marker) map.removeLayer(marker);
    // 把 "Origin Detected" 改成了 "Your current location"
    marker = L.marker(e.latlng).addTo(map).bindPopup("Your current location").openPopup();
});

        // --- Logic Functions ---

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            // Allow map to recalculate its width after transition
            setTimeout(() => { map.invalidateSize(); }, 350);
        }

        function recenterMap(event) {
            event.stopPropagation(); // Prevent map click event
            map.flyTo(userPos || cyberCoord, 16);
        }

        // Add marker on manual click
        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map).bindPopup("Pinned Location").openPopup();
        });

        // Fix rendering on initial load
        window.onload = function() {
            setTimeout(() => { map.invalidateSize(); }, 500);
        };
    </script>
</body>
</html>
