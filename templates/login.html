<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Management System - Login</title>
</head>
<body>
    <div style="max-width: 300px; margin: 50px auto; text-align: center;">
        <h2>System Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p style="color: #ff4d4d; font-size: 0.9em;">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email address" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <br>
            <input type="password" name="password" placeholder="Password" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <br>
            <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">
                Login
            </button>
        </form>
    </div>
</body>
</html>
