<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray Scan - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body {
            /* 1. 告诉 Flask 去 /static/ 文件夹找 background.jpg */
            background-image: url("{{ url_for('static', filename='pictureMMU.jpg') }}");
            
            /* 2. 让图片平铺并覆盖整个屏幕，不随页面滚动 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* 3. 如果图片加载失败，默认显示的颜色 */
            background-color: #667eea;

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 优化：给登录卡片加一点透明度，这样能看到后面的背景，更时尚 */
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: rgba(255, 255, 255, 0.9); /* 90% 不透明 */
            backdrop-filter: blur(5px); /* 让卡片后面的背景模糊（高级感） */
        }

        .btn-primary {
            background-color: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5a6fd6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-4 fw-bold d-flex align-items-center justify-content-center">
                          <img src="{{ url_for('static', filename='logo.png') }}" 
                            alt="Logo" 
                              style="width: 40px; height: auto; margin-right: 10px;">
                               MMU Stray Scan 
                            </h3>
                        <p class="text-center text-muted mb-4">Cyberjaya Community Portal</p>

                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            {% for message in messages %}
                              <div class="alert alert-danger py-2" role="alert">
                                {{ message }}
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" name="email" class="form-control" placeholder="name@student.mmu.edu.my" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Login</button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        <div class="text-center">
                            <small class="text-muted">New to the community? <a href="{{ url_for('register_page') }}" class="text-decoration-none">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
}
</script>
<script>
document.querySelector('form').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
});
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
